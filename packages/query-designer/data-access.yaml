# Data Access Configuration
# ========================
# This file controls which Informer APIs your report can access.
# Without this file, all API access is blocked (secure by default).
#
# Documentation: https://docs.entrinsik.com/informer/magic-reports/data-access

# ============================================================================
# DATASETS
# ============================================================================
datasets: []

# ============================================================================
# QUERIES
# ============================================================================
queries: []

# ============================================================================
# INTEGRATIONS
# ============================================================================
integrations: []

# ============================================================================
# DATASOURCES
# ============================================================================
# Uses wildcard — the app dynamically lists available datasources via the API.
# No hardcoded datasource IDs so it works on any Informer tenant.
datasources:
  - "*"

# ============================================================================
# LIBRARIES
# ============================================================================
libraries: []

# ============================================================================
# RAW API ACCESS (Advanced)
# ============================================================================
apis:
  - POST /api/models/go_everyday/_chat
  - POST /api/models/go_everyday/_completion
  - POST /api/models/go_everyday/_object
  - GET /api/datasources
  - GET /api/datasources/*/mappings-list
  - GET /api/datasources/*/mappings/*/fields-list
  - GET /api/datasources/*/schema.json
  - POST /api/datasources/*/_query
  - POST /api/datasources/*/_search-metadata
